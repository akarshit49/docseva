# #genai: Sprint 3+5 — nginx reverse proxy for the multi-channel platform.
# Routes:
#   /api/v1/*       → FastAPI service (`api:8000`)
#   /whatsapp/*     → WhatsApp adapter (`bot-whatsapp:8080`) — BSP webhook
#   /api/auth/*     → Next.js (cookie-setting handlers)
#   /health         → FastAPI health
#   /               → Next.js web service (`web:3000`)
events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Up to 20 MB file uploads (matches Next bodySizeLimit + API 15 MB cap).
    client_max_body_size 20M;

    # Use Docker's embedded DNS resolver so nginx re-resolves service hostnames
    # on each request instead of caching IPs at startup. This prevents 502s after
    # any container is rebuilt and gets a new internal IP (valid=10s keeps it fresh).
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Upstream addresses as variables — nginx only resolves at request time
        # when proxy_pass uses a variable, so container rebuilds never cause stale IPs.
        set $upstream_api       http://api:8000;
        set $upstream_web       http://web:3000;
        set $upstream_whatsapp  http://bot-whatsapp:8080;

        # Forward auth-flow + proxy Next API routes to web (cookie-setting handlers).
        location /api/auth/ {
            proxy_pass $upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js authenticated proxy route (injects Bearer token server-side).
        location /api/proxy/ {
            proxy_pass $upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Forward FastAPI calls.
        location /api/v1/ {
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location = /health {
            proxy_pass $upstream_api/health;
        }

        # WhatsApp BSP webhook (WATI / Gupshup post here).
        location /whatsapp/ {
            proxy_pass $upstream_whatsapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Everything else → Next.js web app.
        location / {
            proxy_pass $upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
